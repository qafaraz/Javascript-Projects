<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Dice Roll Simulator with random number generation, simple animation, and roll history.">
    <meta name="keywords" content="dice roll simulator, random number, javascript game, vanilla javascript">
    <meta name="author" content="Qafar Qəmbərzadə">
    <title>Dice Roll Simulator | Javascript Project</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section class="dice-app">
            <h1>Dice Roll Simulator</h1>
            <div id="dice" class="dice">
                <span id="diceNumber">1</span>
            </div>
            <button id="rollBtn">Roll Dice</button>
            <h2>Roll History</h2>
            <ul id="history"></ul>
        </section>
    </main>
    <script src="app.js"></script>
</body>

</html>
