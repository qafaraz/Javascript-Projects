<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="New Year countdown project with real-time date and time calculations in JavaScript.">
        <meta name="keywords" content="new year countdown, countdown timer, javascript date, vanilla javascript">
        <meta name="author" content="Qafar Qəmbərzadə">
        <title>New Year Countdown | Javascript Project</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main>
            <section>
                <h1>Countdown to New Year</h1>
                <div id="year">
                    2027
                </div>
                <div id="countdown">
                    <div id="day"></div>
                    <div id="hour"></div>
                    <div id="minute"></div>
                    <div id="second"></div>
                </div>
            </section>
        </main>
        <script src="app.js"></script>
    </body>
</html>
