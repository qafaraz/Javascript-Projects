<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="githubqafaraz">
        <meta name="keywords" content="githubqafaraz">
        <meta name="author" content="githubqafaraz">
        <title>app</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main class="form-wrapper">
            <div class="form-header">
                <h1>Contact Form</h1>
                <p>Send us a quick message</p>
            </div>
            <form>
                <div class="row">
                    <div class="form-group">
                        <label for="firstName">First name</label>
                        <input
                            type="text"
                            id="firstName"
                            placeholder="John"
                            autocomplete="off" required />
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last name</label>
                        <input
                            type="text"
                            id="lastName"
                            placeholder="Doe"
                            autocomplete="off" required />
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="you@example.com"
                        autocomplete="off" required />
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea
                        id="message"
                        placeholder="Write your message here..."
                        required></textarea>
                </div>
                <div class="form-footer">
                    <label class="remember">
                        <input type="checkbox" required />
                        Save my info for next time
                    </label>
                    <button type="submit" class="btn-submit">Send
                        Message
                    </button>
                </div>
                <p class="helper-text">
                    We usually reply within 24 hours on business days.
                </p>
            </form>
            <div id="data"></div>
        </main>
        <script src="app.js"></script>
    </body>
</html>
