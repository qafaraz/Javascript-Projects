<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Simple Pomodoro timer project with start, stop, and reset controls in JavaScript.">
        <meta name="keywords" content="pomodoro timer, productivity timer, javascript timer, vanilla javascript">
        <meta name="author" content="Qafar Qəmbərzadə">
        <title>Pomodoro Timer | Javascript Project</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main>
            <section>
                <h1>
                    Pomodoro Timer
                </h1>
                <div class="time">
                </div>
                <div class="btn">
                    <button id="start">
                        Start
                    </button>
                    <button id="stop">
                        Stop
                    </button>
                    <button id="reset">
                        Reset
                    </button>
                </div>
            </section>
        </main>
        <script src="app.js"></script>
    </body>
</html>
