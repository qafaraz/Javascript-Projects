<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="To Do List project with add, complete, delete, and localStorage support.">
        <meta name="keywords" content="to do list, task manager, localStorage, javascript mini project">
        <meta name="author" content="Qafar Qəmbərzadə">
        <title>To Do List | Javascript Project</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main>
            <section class="todo-app">
                <h1>To Do List</h1>
                <form id="todoForm" class="todo-form">
                    <input id="todoInput" type="text" placeholder="Add a new task..." autocomplete="off" required>
                    <button type="submit">Add</button>
                </form>
                <ul id="todoList"></ul>
            </section>
        </main>
        <script src="app.js"></script>
    </body>
</html>
