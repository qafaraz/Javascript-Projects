<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Mouse Event project to practice hover, click, and pointer position tracking in JavaScript.">
        <meta name="keywords" content="mouse event, pointer tracking, dom events, javascript mini project">
        <meta name="author" content="Qafar Qəmbərzadə">
        <title>Mouse Event | Javascript Project</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main>
            <section class="mouse-app">
                <h1>Mouse Event Tracker</h1>
                <p>Move your mouse inside the area and click to see live event updates.</p>
                <div id="eventArea" class="event-area">
                    <span>Interact Here</span>
                </div>
                <div class="stats">
                    <p><strong>Event:</strong> <span id="eventType">Waiting...</span></p>
                    <p><strong>X:</strong> <span id="xPos">-</span></p>
                    <p><strong>Y:</strong> <span id="yPos">-</span></p>
                </div>
            </section>
        </main>
        <script src="app.js"></script>
    </body>
</html>
